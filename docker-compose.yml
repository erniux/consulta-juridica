services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${DB_NAME:-consulta_juridica}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-consulta_juridica}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: sh /app/docker/backend/start-web.sh
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./docker:/app/docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: sh /app/docker/backend/start-worker.sh
    volumes:
      - ./backend:/app/backend
      - ./docker:/app/docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    command: sh /app/docker/frontend/start.sh
    ports:
      - "${FRONTEND_PORT:-15173}:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./docker:/app/docker
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  db_data:
  frontend_node_modules:
